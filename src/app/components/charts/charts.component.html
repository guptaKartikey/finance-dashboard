<div class="charts-container">
  <div class="chart-wrapper">
    <h3>Monthly Balance Trend</h3>
    <canvas baseChart
  [data]="lineChartData"
  [options]="lineChartOptions"
  [type]="'line'">
</canvas>

<canvas baseChart
  [data]="barChartData"
  [options]="barChartOptions"
  [type]="'bar'">
</canvas>

<canvas baseChart
  [data]="pieChartData"
  [options]="pieChartOptions"
  [type]="'pie'">
</canvas>
  </div>
</div>
